<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>AEroiX</title>

<style>
body {
    background: black;
    color: red;
    font-family: monospace;
    text-align: center;
    margin: 0;
}

/* quitar azul links */
a {
    text-decoration: none;
    color: inherit;
}

/* matrix */
canvas {
    position: fixed;
    top: 0;
    left: 0;
    z-index: -1;
}

/* título */
h1 {
    font-size: 55px;
    text-shadow: 0 0 20px red;
    margin-top: 20px;
}

/* textos grandes */
p {
    font-size: 22px;
    text-shadow: 0 0 10px red;
}

/* contador */
#contador {
    font-size: 20px;
    margin-top: 10px;
}

/* categorías */
h2 {
    margin-top: 50px;
    font-size: 26px;
    text-shadow: 0 0 10px red;
}

/* cajas */
.box {
    width: 230px;
    height: 100px;
    border-radius: 12px;

    display: inline-flex;
    justify-content: center;
    align-items: center;
    margin: 10px;

    font-size: 20px;
    letter-spacing: 2px;

    color: #ddd;

    /* estilo más suave */
    background: rgba(255, 255, 255, 0.05);
    backdrop-filter: blur(6px);

    border: 1px solid rgba(255, 255, 255, 0.15);

    box-shadow: 0 5px 15px rgba(0,0,0,0.4);

    transition: 0.25s ease;
}

.box:hover {
    transform: translateY(-3px);

    /* sombra más elegante */
    box-shadow: 0 10px 25px rgba(0,0,0,0.6);

    /* leve cambio, sin rojo fuerte */
    border: 1px solid rgba(100, 150, 255, 0.3);

    background: rgba(255, 255, 255, 0.08);
}
</style>
</head>

<body>

<canvas id="matrix"></canvas>

<h1>AEroiX</h1>
<p>ESCANEANDO DATOS...</p>
<div id="contador">VISITAS: 0</div>

<h2>REDES</h2>
<a href="https://tiktok.com" target="_blank"><div class="box">TikTok</div></a>
<a href="https://youtube.com" target="_blank"><div class="box">YouTube</div></a>

<h2>COMUNIDAD</h2>
<a href="https://discord.com" target="_blank"><div class="box">Discord</div></a>

<script>
/* contador simple estable */
let visitas = localStorage.getItem("visitas") || 0;
visitas++;
localStorage.setItem("visitas", visitas);
document.getElementById("contador").innerText = "VISITAS: " + visitas;

/* MATRIX */
const canvas = document.getElementById("matrix");
const ctx = canvas.getContext("2d");

canvas.height = window.innerHeight;
canvas.width = window.innerWidth;

let letras = "0123456789AEroiX".split("");
let fontSize = 14;
let columns = canvas.width / fontSize;
let drops = [];

for (let x = 0; x < columns; x++) drops[x] = 1;

function draw() {
    ctx.fillStyle = "rgba(0,0,0,0.05)";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    ctx.fillStyle = "red";
    ctx.font = fontSize + "px monospace";

    for (let i = 0; i < drops.length; i++) {
        let text = letras[Math.floor(Math.random() * letras.length)];
        ctx.fillText(text, i * fontSize, drops[i] * fontSize);

        if (drops[i] * fontSize > canvas.height && Math.random() > 0.95)
            drops[i] = 0;

        drops[i]++;
    }
}

setInterval(draw, 35);
</script>

</body>
</html>
