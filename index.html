<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AEroiX</title>

<style>
body {
    background: black;
    color: #ff4d4d;
    font-family: monospace;
    text-align: center;
}

a { text-decoration: none; color: inherit; }

canvas {
    position: fixed;
    z-index: -1;
}

h1 {
    font-size: 50px;
    letter-spacing: 3px;
}

p, #contador {
    font-size: 20px;
    opacity: 0.8;
}

h2 {
    margin-top: 50px;
    font-size: 24px;
    opacity: 0.7;
}

.box {
    width: 220px;
    height: 100px;
    border: 1px solid rgba(255,0,0,0.4);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    margin: 10px;
    font-size: 18px;
    background: rgba(255,0,0,0.05);
}

.box:hover {
    border: 1px solid red;
    background: rgba(255,0,0,0.15);
}
</style>
</head>

<body>
<canvas id="matrix"></canvas>

<h1>AEroiX</h1>
<p>ESCANEANDO SISTEMA...</p>
<div id="contador"></div>

<h2>LINKS</h2>
<a href="#"><div class="box">TikTok</div></a>
<a href="#"><div class="box">YouTube</div></a>

<script>
let v=localStorage.getItem("v")||0;v++;localStorage.setItem("v",v);
document.getElementById("contador").innerText="USUARIOS: "+v;

const c=document.getElementById("matrix"),x=c.getContext("2d");
c.height=innerHeight;c.width=innerWidth;
let l="0123456789".split(""),f=14,cols=c.width/f,d=[];
for(let i=0;i<cols;i++)d[i]=1;
setInterval(()=>{
x.fillStyle="rgba(0,0,0,0.05)";
x.fillRect(0,0,c.width,c.height);
x.fillStyle="#ff4d4d";
x.font=f+"px monospace";
d.forEach((y,i)=>{
x.fillText(l[Math.random()*l.length|0],i*f,y*f);
if(y*f>c.height&&Math.random()>0.95)d[i]=0;
d[i]++;
});
},35);
</script>
</body>
</html>
