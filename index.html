<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AEroiX</title>

<style>
body {
    background: black;
    color: red;
    font-family: monospace;
    padding: 20px;
}

a { text-decoration: none; color: inherit; }

canvas {
    position: fixed;
    z-index: -1;
}

h1 {
    font-size: 40px;
}

p, #contador {
    font-size: 18px;
}

.box {
    border: 1px solid red;
    padding: 15px;
    margin: 10px auto;
    width: 300px;
    text-align: left;
}

.box:hover {
    background: red;
    color: black;
}
</style>
</head>

<body>
<canvas id="matrix"></canvas>

<h1>> AEroiX SYSTEM</h1>
<p>> INICIANDO...</p>
<p id="contador"></p>

<a href="#"><div class="box">> TikTok</div></a>
<a href="#"><div class="box">> YouTube</div></a>

<script>
let v=localStorage.getItem("v")||0;v++;localStorage.setItem("v",v);
document.getElementById("contador").innerText="> VISITAS: "+v;

const c=document.getElementById("matrix"),x=c.getContext("2d");
c.height=innerHeight;c.width=innerWidth;
let l="01AEroiX".split(""),f=14,cols=c.width/f,d=[];
for(let i=0;i<cols;i++)d[i]=1;
setInterval(()=>{
x.fillStyle="rgba(0,0,0,0.05)";
x.fillRect(0,0,c.width,c.height);
x.fillStyle="red";
x.font=f+"px monospace";
d.forEach((y,i)=>{
x.fillText(l[Math.random()*l.length|0],i*f,y*f);
if(y*f>c.height&&Math.random()>0.95)d[i]=0;
d[i]++;
});
},35);
</script>
</body>
</html>
