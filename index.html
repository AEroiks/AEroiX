<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>AEroiX</title>

<style>
body {
    background: black;
    color: red;
    font-family: monospace;
    text-align: center;
}

/* Título */
h1 {
    font-size: 50px;
    text-shadow: 0 0 15px red;
    margin-top: 20px;
}

/* Categorías */
h2 {
    margin-top: 60px;
    margin-bottom: 10px;
    text-shadow: 0 0 10px red;
    border-bottom: 1px solid red;
    display: inline-block;
    padding-bottom: 5px;
}

/* Contenedor */
.container {
    width: 80%;
    margin: auto;
}

/* Grupo de cajas */
.categoria {
    display: flex;
    justify-content: center;
    gap: 20px;
    flex-wrap: wrap;
    margin-bottom: 30px;
}

/* Casillas */
.box {
    width: 240px;
    height: 110px;
    border: 2px solid rgba(255, 0, 0, 0.6);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: 0.3s;

    /* TEXTO */
    font-size: 20px;
    font-weight: 500;
    letter-spacing: 2px;
    color: #ff4d4d;

    /* EFECTO SUAVE */
    text-shadow: 0 0 5px rgba(255, 0, 0, 0.5);

    /* FONDO SUAVE */
    background: rgba(255, 0, 0, 0.05);
}

/* Hover */
.box:hover {
    background: rgba(255, 0, 0, 0.15);
    border: 2px solid red;

    box-shadow: 0 0 15px red;

    transform: scale(1.05);
}

/* Contador */
#contador {
    margin-top: 15px;
    font-size: 18px;
}
</style>

</head>

<body>

<h1>AEroiX</h1>
<p>ESCANEANDO BASE DE DATOS...</p>

<div id="contador">Cargando visitas...</div>

<div class="container">

<h2>JUEGOS/ROLEPLAY +18</h2>
<div class="categoria">
    <a href="https://www.nutaku.net" target="_blank""><div class="box">Nutaku</div></a>
    <a href="https://store.steampowered.com/app/2692440/LoveCraft/" target="_blank"><div class="box">LoveCraft</div></a>
</div>

<h2>COMUNIDAD</h2>
<div class="categoria">
    <a href="https://www.nutaku.net/home/" target="_blank"><div class="box">Discord</div></a>
    <a href="https://instagram.com" target="_blank"><div class="box">Instagram</div></a>
</div>

<h2>EXTRAS</h2>
<div class="categoria">
    <a href="https://google.com" target="_blank"><div class="box">Web</div></a>
</div>

</div>

<script>
let visitas = localStorage.getItem("visitas");

if (!visitas) {
    visitas = 1;
} else {
    visitas = parseInt(visitas) + 1;
}

localStorage.setItem("visitas", visitas);

document.getElementById("contador").innerText =
    "TOTAL VISITAS: " + visitas;
</script>

</body>
</html>
