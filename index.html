<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>AEroiX</title>

<style>
body {
    background: black;
    color: red;
    font-family: monospace;
    text-align: center;
}

/* Título */
h1 {
    font-size: 50px;
    text-shadow: 0 0 10px red;
}

/* Caja principal */
.container {
    margin-top: 30px;
}

/* Botones tipo cuadro */
.box {
    display: inline-block;
    width: 200px;
    height: 100px;
    border: 2px solid red;
    margin: 10px;
    line-height: 100px;
    cursor: pointer;
    transition: 0.3s;
}

.box:hover {
    background: red;
    color: black;
    box-shadow: 0 0 20px red;
}

/* contador */
#contador {
    margin-top: 20px;
    font-size: 18px;
}
</style>

</head>

<body>

<h1>AEroiX</h1>

<p>ESCANEANDO BASE DE DATOS...</p>

<div id="contador">Cargando visitas...</div>

<div class="container">

<a href="https://google.com" target="_blank">
<div class="box">Link 1</div>
</a>

<a href="https://youtube.com" target="_blank">
<div class="box">Link 2</div>
</a>

<a href="https://discord.com" target="_blank">
<div class="box">Link 3</div>
</a>

<a href="https://tiktok.com" target="_blank">
<div class="box">Link 4</div>
</a>

</div>

<script>
/* contador simple */
let visitas = localStorage.getItem("visitas");

if (!visitas) {
    visitas = 1;
} else {
    visitas = parseInt(visitas) + 1;
}

localStorage.setItem("visitas", visitas);

document.getElementById("contador").innerText =
    "TOTAL VISITAS: " + visitas;
</script>

</body>
</html>
