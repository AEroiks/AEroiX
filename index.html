<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>AEroiX</title>

<style>
body {
    background: black;
    color: red;
    font-family: monospace;
    text-align: center;
}

/* Título principal */
h1 {
    font-size: 50px;
    text-shadow: 0 0 15px red;
    margin-top: 20px;
}

/* Subtítulos (categorías) */
h2 {
    border-bottom: 1px solid red;
    display: inline-block;
    padding-bottom: 5px;
    margin-top: 40px;
    text-shadow: 0 0 10px red;
}

/* Contenedor general */
.container {
    margin-top: 20px;
}

/* Grupo de cajas */
.categoria {
    margin-bottom: 20px;
}

/* Casillas */
.box {
    display: inline-block;
    width: 180px;
    height: 90px;
    border: 2px solid red;
    margin: 10px;
    line-height: 90px;
    cursor: pointer;
    transition: 0.3s;
}

/* Efecto hover */
.box:hover {
    background: red;
    color: black;
    box-shadow: 0 0 20px red;
}

/* Contador */
#contador {
    margin-top: 15px;
    font-size: 18px;
}
</style>

</head>

<body>

<h1>AEroiX</h1>
<p>ESCANEANDO BASE DE DATOS...</p>

<div id="contador">Cargando visitas...</div>

<div class="container">

<h2>REDES SOCIALES</h2>
<div class="categoria">
    <a href="https://tiktok.com" target="_blank"><div class="box">TikTok</div></a>
    <a href="https://youtube.com" target="_blank"><div class="box">YouTube</div></a>
</div>

<h2>COMUNIDAD</h2>
<div class="categoria">
    <a href="https://discord.com" target="_blank"><div class="box">Discord</div></a>
    <a href="https://instagram.com" target="_blank"><div class="box">Instagram</div></a>
</div>

<h2>EXTRAS</h2>
<div class="categoria">
    <a href="https://google.com" target="_blank"><div class="box">Web</div></a>
</div>

</div>

<script>
/* Contador básico */
let visitas = localStorage.getItem("visitas");

if (!visitas) {
    visitas = 1;
} else {
    visitas = parseInt(visitas) + 1;
}

localStorage.setItem("visitas", visitas);

document.getElementById("contador").innerText =
    "TOTAL VISITAS: " + visitas;
</script>

</body>
</html>
