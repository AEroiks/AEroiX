<script>
/* contador simple estable */
let visitas = localStorage.getItem("visitas") || 0;
visitas++;
localStorage.setItem("visitas", visitas);
document.getElementById("contador").innerText = "VISITAS: " + visitas;

/* MATRIX */
const canvas = document.getElementById("matrix");
const ctx = canvas.getContext("2d");

canvas.height = window.innerHeight;
canvas.width = window.innerWidth;

let letras = "0123456789AEroiX".split("");
let fontSize = 14;
let columns = canvas.width / fontSize;
let drops = [];

for (let x = 0; x < columns; x++) drops[x] = 1;

function draw() {
    ctx.fillStyle = "rgba(0,0,0,0.05)";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    ctx.fillStyle = matrixColor;
    ctx.font = fontSize + "px monospace";

    for (let i = 0; i < drops.length; i++) {
        let text = letras[Math.floor(Math.random() * letras.length)];
        ctx.fillText(text, i * fontSize, drops[i] * fontSize);

        if (drops[i] * fontSize > canvas.height && Math.random() > 0.95)
            drops[i] = 0;

        drops[i]++;
    }
}

setInterval(draw, 35);
    
    let matrixColor = "red";

document.querySelectorAll(".color").forEach(btn => {
    btn.onclick = () => {
        const color = btn.getAttribute("data-color");
        matrixColor = color;

        document.body.style.color = color;

        document.querySelectorAll("h1, h2").forEach(el => {
            el.style.textShadow = `0 0 15px ${color}`;
        });

        document.querySelectorAll(".box").forEach(box => {
            box.style.border = `1px solid ${color}`;
            box.style.boxShadow = `0 0 10px ${color}`;
        });
    };
});
</script>
