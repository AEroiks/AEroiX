<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>AEroiX</title>

<style>
body {
    background: black;
    color: red;
    font-family: monospace;
    text-align: center;
    margin: 0;
}

a { text-decoration: none; color: inherit; }

canvas {
    position: fixed;
    top: 0;
    left: 0;
    z-index: -1;
}

h1 {
    font-size: 60px;
    text-shadow: 0 0 30px red;
}

p, #contador {
    font-size: 24px;
    text-shadow: 0 0 15px red;
}

h2 {
    font-size: 28px;
    margin-top: 50px;
    text-shadow: 0 0 20px red;
}

.box {
    width: 240px;
    height: 110px;
    border: 2px solid red;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    margin: 10px;
    font-size: 22px;
    font-weight: bold;
}

.box:hover {
    background: red;
    color: black;
    box-shadow: 0 0 40px red;
}
</style>
</head>

<body>
<canvas id="matrix"></canvas>

<h1>AEroiX</h1>
<p>ESCANEANDO DATOS...</p>
<div id="contador"></div>

<h2>REDES</h2>
<a href="https://tiktok.com" target="_blank"><div class="box">TikTok</div></a>
<a href="https://youtube.com" target="_blank"><div class="box">YouTube</div></a>

<script>
let v=localStorage.getItem("v")||0;v++;localStorage.setItem("v",v);
document.getElementById("contador").innerText="VISITAS: "+v;

const c=document.getElementById("matrix"),x=c.getContext("2d");
c.height=innerHeight;c.width=innerWidth;
let l="0123456789".split(""),f=14,cols=c.width/f,d=[];
for(let i=0;i<cols;i++)d[i]=1;
setInterval(()=>{
x.fillStyle="rgba(0,0,0,0.05)";
x.fillRect(0,0,c.width,c.height);
x.fillStyle="red";
x.font=f+"px monospace";
d.forEach((y,i)=>{
x.fillText(l[Math.random()*l.length|0],i*f,y*f);
if(y*f>c.height&&Math.random()>0.95)d[i]=0;
d[i]++;
});
},35);
</script>
</body>
</html>
